session_name: A6-PROD-marketdata

shell_command_before:
  - export TP_TODAY=$(date +%Y-%m-%d)
  - export TP_LOG_DIR="/srv/pr_ramdisk/"$TP_TODAY
  
  - export TP_HOST_MD_PR_01="ld4prmdcap01"
  - export TP_HOST_MD_DR_01="ln1prmdcap01"

windows:
  # --- A feed ---
  - window_name: aquis-spit-out-A-stream-LD4-01
    layout: tiled
    panes:
      # --- _UK ---
      # alias prLSEAtail
      - shell_command:
          - export TP_MDFILE="A_LSE_UK_1G_MMT_mdstream.log"
          - sleep 0.3
          - tmux select-pane -t "$TMUX_PANE" -T "$TP_MDFILE"
          - exec ssh -t $TP_HOST_MD_PR_01 "clear; cd /srv/pr/$TP_TODAY; tail -10 $TP_MDFILE; echo; ls -l $TP_MDFILE; date; bash"
          
      # alias prENXAtail
      - shell_command:
          - export TP_MDFILE="A_ENXT_UK_1G_MMT_mdstream.log"
          - sleep 0.3
          - tmux select-pane -t "$TMUX_PANE" -T "$TP_MDFILE"
          - exec ssh -t $TP_HOST_MD_PR_01 "clear; cd /srv/pr/$TP_TODAY; tail -10 $TP_MDFILE; echo; ls -l $TP_MDFILE; date; bash"

      # alias prXETAtail
      - shell_command:
          - export TP_MDFILE="A_XET_UK_1G_MMT_mdstream.log"
          - sleep 0.3
          - tmux select-pane -t "$TMUX_PANE" -T "$TP_MDFILE"
          - exec ssh -t $TP_HOST_MD_PR_01 "clear; cd /srv/pr/$TP_TODAY; tail -10 $TP_MDFILE; echo; ls -l $TP_MDFILE; date; bash"

      # --- _EU ---
      - shell_command:
          - export TP_MDFILE="A_ENXT_EU_1G_MMT_mdstream.log"
          - sleep 0.3
          - tmux select-pane -t "$TMUX_PANE" -T "$TP_MDFILE"
          - exec ssh -t $TP_HOST_MD_PR_01 "clear; cd /srv/pr/$TP_TODAY; tail -10 $TP_MDFILE; echo; ls -l $TP_MDFILE; date; bash"

      - shell_command:
          - export TP_MDFILE="A_XET_EU_1G_MMT_mdstream.log"
          - sleep 0.3
          - tmux select-pane -t "$TMUX_PANE" -T "$TP_MDFILE"
          - exec ssh -t $TP_HOST_MD_PR_01 "clear; cd /srv/pr/$TP_TODAY; tail -10 $TP_MDFILE; echo; ls -l $TP_MDFILE; date; bash"

      - shell_command:
          - sleep 0.3
          - tmux select-pane -t "$TMUX_PANE" -T "$TP_HOST_MD_PR_01"
          - exec ssh -t $TP_HOST_MD_PR_01 "clear; echo \"just a bash shell on $TP_HOST_MD_PR_01 for support\"; echo; bash --rcfile ~/.bashrc_light"







