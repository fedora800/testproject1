          - exec ssh -t ld4prmdcap01 'clear; cd /srv/pr/$(date +%Y-%m-%d); ls -l A_LSE_UK_1G_MMT_mdstream.log; tail -10 A_LSE_UK_1G_MMT_mdstream.log'
      - shell_command:
          - sleep 0.3
          - tmux select-pane -t "$TMUX_PANE" -T "ld4prmdcap02"
          - exec ssh -t ld4prmdcap02 'hostname; bash --rcfile ~/.bashrc_light'
