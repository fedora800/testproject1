  - window_name: check-security-and-tick-files
    layout: tiled
    panes:
      - shell_command:
          - sleep 0.3
          - tmux select-pane -t "$TMUX_PANE" -T "ld4prftp01"
          - exec ssh -t ld4prftp01 'find /srv/ftp/pub/* -newermt ""$(date +%Y-%m-%d)"" -type f | xargs ls -lh; bash --rcfile ~/.bashrc_light'
      - shell_command:
          - sleep 0.3
          - tmux select-pane -t "$TMUX_PANE" -T "ln1prftp01"
          - exec ssh -t ln1prftp01 'find /srv/ftp/pub/* -newermt ""$(date +%Y-%m-%d)"" -type f | xargs ls -lh; bash --rcfile ~/.bashrc_light'
