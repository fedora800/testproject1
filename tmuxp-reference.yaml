
# refer https://tmuxp.git-pull.com/configuration/examples/

# we can only specify ONE session name in an yaml file, multiple sessions not allowed.


 session_name: my-REF-session
 shell_command_before:                # SESSION level shell command invocation
   - source ~/git-projects/dotfiles/.bash_profile.mine
 # Equivalent to tmux new-window -c <start-directory>
 start_directory: /var/
 windows:
   - window_name: dev window
     options:
       window-status-style: "bg=green,fg=black"                      # this will change the colour of the window name on the STATUS bar
     layout: tiled
          # options - even-horizontal, even-vertical, main-horizontal, main-vertical, or tiled.
     shell_command_before:            # WINDOW level shell command invocation
       - cd ~/
       - source ~/git-projects/dotfiles/.bash_profile.mine
     panes:                           # mandatory - even if we have no pane in the window
       - shell_command:               # PANE level shell command invocation
           - cd /var/log
           - ls -al | grep \.log
       - echo hello
       - echo hello
       - echo hello
   - window_name: should be /var/
     panes:
       - shell_command:
 # i dont know why, but below echo command splits output onto 2 lines
           - echo "\033c
           - it trickles down from session-level  w1-p1"
       - echo hello w1-p2
       - ssh -t ld4prinieu01 'hostname; bash --rcfile ~/.bashrc_light'
   - window_name: should be /var/log
     start_directory: log
     panes:
       - shell_command:
           - echo '\033c
           - window start_directory concatenates to session start_directory
           - if it is not absolute w2-p1'
       - echo hello w1-p2
   - window_name: should be ~
     start_directory: "~"
     panes:
       - shell_command:
           - 'echo \\033c ~ has precedence. note: remember to put quotes around  ~ in YAML  w3-p1'
       - echo hello w3-p2
   - window_name: should be /bin
     start_directory: /bin
     panes:
       - echo '\033c absolute paths also have precedence.  w4-p1'
       - echo hello w4-p2
   - window_name: should be workspace file's dir
 
     start_directory: ./
     panes:
       - shell_command:
           - echo '\033c
           - ./ is relative to workspace file location
           - ../ will be parent of workspace file
           - ./test will be \"test\" dir inside dir of workspace file'
       - shell_command:
           - echo '\033c
           - This way you can load up workspaces from projects and maintain
           - relative paths.'
   - window_name: ssh-and-remote-cmds
     panes:
       #- ssh -t ld4prftp01 'hostname; bash --rcfile ~/.bashrc_light; cd /srv/ftp/pub/refdata; ls -ltr *csv | tail -2'
       - shell_command:
         - ssh -t myremotehost
         - cd /etc
         - ls -ltr *release*
         - grep PRETTY os-release




session_name: 4-pane-split
windows:
  - window_name: dev window
    layout: tiled
    shell_command_before:
      - cd ~/ # run as a first command in all panes
    panes:
      - shell_command: # pane no. 1
          - cd /var/log # run multiple commands in this pane
          - ls -al | grep \.log
      - echo second pane # pane no. 2
  - window_name: PROD-INI-EU
    layout: tiled
    panes:
#      - pane_title: ld4prinieu02
      - shell_command:
          - sleep 0.3
          - tmux select-pane -t "$TMUX_PANE" -T "ld4prinieu01"
          - exec ssh -t ld4prinieu01 'hostname; bash --rcfile ~/.bashrc_light'
      - shell_command:
          - sleep 0.3
          - tmux select-pane -t "$TMUX_PANE" -T "ld4prinieu02"
          - exec ssh -t ld4prinieu02 'hostname; bash --rcfile ~/.bashrc_light'

# Add a global tmux safeguard (prevents future surprises)
# 
# In your .tmux.conf:
# 
# set -g allow-rename off
# set -g automatic-rename off
# 
# This stops tmux or SSH from silently overwriting your pane names later.
