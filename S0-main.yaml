session_name: S0-main
shell_command_before:
  - source ~/git-projects/dotfiles/.bash_profile.mine

windows:
  - window_name: bash
    layout: tiled
    shell_command_before:
      - ls -ltrFAh
  - window_name: dotfiles
    panes:
    - shell_command:
      - cd ~/git-projects/dotfiles
  - window_name: testproject1
    panes:
    - shell_command:
      - cd ~/git-projects/testproject1
  - window_name: tmuxp
    layout: main-horizontal
    panes:
      - cd ~/git-projects/testproject1
      - cd ~/git-projects/testproject1
  - window_name: jb-files
    layout: main-horizontal
    shell_command_before:
      - pwd
    panes:
      - cd ~/jb-bashfiles/.bashfiles/plugins/aquis
      - cd ~; ls -ltr todo-*
  - window_name: scratch
    layout: main-horizontal
    panes:
      - cd ~/temp
